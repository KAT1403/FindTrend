<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="Findtrend lets you gather your favorite websites in one place and follow trends easily." />
  <meta name="keywords" content="Findtrend, tabs organizer, trends, productivity, browser tabs, startup" />
  <meta name="author" content="Findtrend Team" />
  <title>Findtrend</title>
  <link rel="icon" href="assets/favicon.ico" type="image/x-icon" />
  <link rel="stylesheet" href="index.css">
</head>

<body>
  <div class="container">

    <div class="welcome" aria-labelledby="welcome-title">

      <header role="banner">
        <div class="header-logo">
          <img src="assets/Logo.svg" alt="Findtrend Logo" />
          <span>Findtrend</span>
        </div>

        <nav class="header-nav" role="navigation" aria-label="Main menu">
          <a href="#">About</a>
          <a href="#">How it work</a>
          <a href="#">Pricing</a>
          <a href="#">Solution</a>
          <a href="#">Features</a>
        </nav>

        <div class="header-actions">
          <button class="header-login" aria-label="Login">Login</button>
          <button class="header-register" aria-label="Register">Register</button>
        </div>

      </header>

      <div class="starter">
        <h1 id="welcome-title">Minimize your tabs.</h2>
        <h1>Find the trends!</h2>
        <p>
          Don’t let your computer memories consumes all of those browser tabs.
          Findtrend let you gathers all of your favorite website into one place.
        </p>
        <button class="getStartBtn" aria-label="Get Started with Findtrend">Get Started 🔥</button>
      </div>

      <div class="BottomButtons" aria-label="Example searches">
        <button class="twitter" aria-label="Search Cryptopunk"> <img src="assets/Twitter.svg"> Cryptopunk - Search
          <img src="assets/cross.svg"> </button>
        <button class="pinterest" aria-label="Search Popular Design"><img src="assets/Pinterest.svg"> Popular Design -
          Search <img src="assets/cross.svg"></button>
        <button class="facebook" aria-label="Search Product Design"> <img src="assets/facebook.svg">Product Design -
          Search <img src="assets/cross.svg"></button>
        <button class="pelmen" aria-label="Search Elon Musk"> <img src="assets/Mask.svg"> Elon Musk - Search <img
            src="assets/cross.svg"></button>
      </div>

    </div>
</body>

</html>
